version: '3.8'

services:
  database:
    # PostGIS extension for spatial queries (nearby drivers)
    image: postgis/postgis:15-3.3
    container_name: rideapp_postgis
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  messaging:
    # Redis 7 for low-latency Pub/Sub messaging
    image: redis:7-alpine
    container_name: rideapp_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  postgres_data:
  redis_data:
